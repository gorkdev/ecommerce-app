include: package:flutter_lints/flutter.yaml

analyzer:
  # Machine-written by gen_l10n; not held to the hand-written bar.
  exclude:
    - lib/l10n/generated/**
  language:
    # Implicit casts and dynamic-typed holes are where JSON parsing bugs hide.
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_final_locals
    - prefer_single_quotes
    - unawaited_futures
